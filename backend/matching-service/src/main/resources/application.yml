# =============================================================================
# matching-service — base configuration
# =============================================================================
spring:
  application:
    name: matching-service

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:rideflow}?currentSchema=matching
    username: ${MATCHING_DB_USER:matching_user}
    password: ${MATCHING_DB_PASSWORD:matching_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      pool-name: matching-pool

  jpa:
    properties:
      hibernate:
        default_schema: matching
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false                     # never. expensive lazy-load surprise.
    hibernate:
      ddl-auto: validate                    # Flyway is the source of truth

  flyway:
    enabled: true
    schemas: matching
    default-schema: matching
    locations: classpath:db/migration

  data:
    redis:
      repositories:
        enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_INTERNAL:kafka:9092}
    consumer:
      group-id: matching-service
      client-id: matching-service-consumer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
    producer:
      client-id: matching-service-producer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      missing-topics-fatal: false

rideflow:
  redis:
    geo:
      host: ${REDIS_GEO_HOST:redis-geo}
      port: ${REDIS_GEO_PORT:6379}
      database: 0
      timeout: 500ms

  dispatch:
    # K-nearest candidates pulled per attempt
    candidate-limit: 20
    # Radius expansion ladder
    attempts:
      - 3000
      - 5000
      - 8000
    # Scorer weights — must sum to 1.0
    weight:
      distance: 0.70
      heading:  0.30
    outbox:
      poll-interval-ms: 500
      batch-size: 100
      max-attempts: 10
    # Distributed lock — prevents two concurrent dispatches from offering
    # the same driver. Backed by Redisson against the GEO Redis instance.
    lock:
      key-prefix: "dispatch:lock:driver:"
      wait-millis: 0           # non-blocking — move to next candidate on contention
      lease-millis: 8000       # auto-release if dispatcher hangs (no watchdog)
      acquire-retry-attempts: 2
      acquire-retry-interval-millis: 100

server:
  port: 8084
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json
  forward-headers-strategy: native

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.rideflow: DEBUG
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n'
