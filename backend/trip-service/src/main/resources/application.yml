# =============================================================================
# trip-service — base configuration
# Owns the post-assignment ride/trip lifecycle (offer → accept → start →
# complete/cancel) and publishes the ride.* lifecycle events.
# =============================================================================
spring:
  application:
    name: trip-service

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:rideflow}?currentSchema=trip
    username: ${TRIP_DB_USER:trip_user}
    password: ${TRIP_DB_PASSWORD:trip_pass}
    hikari:
      maximum-pool-size: 16
      minimum-idle: 4
      connection-timeout: 5000
      pool-name: trip-pool

  jpa:
    properties:
      hibernate:
        default_schema: trip
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
    hibernate:
      ddl-auto: validate                    # Flyway owns DDL

  flyway:
    enabled: true
    schemas: trip
    default-schema: trip
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_INTERNAL:kafka:9092}
    consumer:
      group-id: trip-service
      client-id: trip-service-consumer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
    producer:
      client-id: trip-service-producer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      missing-topics-fatal: false

rideflow:
  trip:
    # An offer to the assigned driver is honoured for this long; after it the
    # sweeper expires it (and the ride fails — no re-dispatch this iteration).
    offer-ttl-seconds: 30
    sweeper:
      interval-ms: 5000
    outbox:
      poll-interval-ms: 500
      batch-size: 100
      max-attempts: 10
      send-timeout-ms: 5000

server:
  port: 8087
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json
  forward-headers-strategy: native

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.rideflow: DEBUG
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n'
