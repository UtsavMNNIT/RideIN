# =============================================================================
# rider-service — base configuration
# =============================================================================
spring:
  application:
    name: rider-service

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:rideflow}?currentSchema=rider
    username: ${RIDER_DB_USER:rider_user}
    password: ${RIDER_DB_PASSWORD:rider_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: rider-pool

  jpa:
    properties:
      hibernate:
        default_schema: rider
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    schemas: rider
    default-schema: rider
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_INTERNAL:kafka:9092}
    producer:
      client-id: rider-service-producer
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: rider-service
      client-id: rider-service-consumer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
    listener:
      ack-mode: manual_immediate
      concurrency: 3
      missing-topics-fatal: false

rideflow:
  cors:
    allowed-origins: ${RIDEFLOW_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

  security:
    jwt:
      secret: ${RIDER_JWT_SECRET:dev-only-rider-service-secret-change-me-please-0123456789}
      issuer: ${RIDER_JWT_ISSUER:rideflow-rider-service}
      access-token-ttl: ${RIDER_JWT_TTL:PT12H}

  # Transactional outbox relay — ships ride-request events to Kafka.
  outbox:
    relay:
      batch-size: ${RIDER_OUTBOX_BATCH:100}
      interval-ms: ${RIDER_OUTBOX_INTERVAL_MS:1000}
      send-timeout-ms: ${RIDER_OUTBOX_SEND_TIMEOUT_MS:5000}

  ride:
    history:
      max-limit: 100

server:
  port: 8081
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json
  forward-headers-strategy: native

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.rideflow: DEBUG
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n'
