# =============================================================================
# driver-service — base configuration
# Profile-specific overrides in application-{local,docker,test}.yml
# =============================================================================
spring:
  application:
    name: driver-service

  jackson:
    deserialization:
      fail-on-unknown-properties: false   # forward-compatible event consumption
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false    # ISO-8601 everywhere

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:rideflow}?currentSchema=driver
    username: ${DRIVER_DB_USER:driver_user}
    password: ${DRIVER_DB_PASSWORD:driver_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: driver-pool

  jpa:
    properties:
      hibernate:
        default_schema: driver
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
    hibernate:
      ddl-auto: validate                  # schema is owned by Flyway, never Hibernate

  flyway:
    enabled: true
    schemas: driver
    default-schema: driver
    locations: classpath:db/migration

  kafka:
    # Internal listener — overridden per profile / via env.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_INTERNAL:kafka:9092}
    properties:
      reconnect.backoff.ms: 100
      reconnect.backoff.max.ms: 5000
      # Producer ID lifecycle — keep transactional state local to the broker.
      enable.idempotence: true
    producer:
      client-id: driver-service-producer
      acks: all
      # The full producer tuning lives in KafkaProducerConfig.java
      # to keep YAML lean and document each non-default in code.
    consumer:
      # Ride-lifecycle listener that syncs driver availability (ON_TRIP / ONLINE).
      group-id: driver-service
      client-id: driver-service-consumer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        session.timeout.ms: 30000
        max.poll.interval.ms: 300000
    listener:
      ack-mode: manual_immediate
      concurrency: 2
      missing-topics-fatal: false

rideflow:
  # CORS for HTTP endpoints. Production should pin to the deployed frontend origin.
  cors:
    allowed-origins: ${RIDEFLOW_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

  security:
    jwt:
      # 32+ byte secret required for HS256. MUST be overridden in every real environment.
      secret: ${DRIVER_JWT_SECRET:dev-only-driver-service-secret-change-me-please-0123456789}
      issuer: ${DRIVER_JWT_ISSUER:rideflow-driver-service}
      access-token-ttl: ${DRIVER_JWT_TTL:PT12H}

server:
  port: 8083
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json
  forward-headers-strategy: native        # gateway terminates TLS / sets X-Forwarded-*

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: ${spring.application.name}
  observations:
    key-values:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0                    # tuned down in Phase 9

logging:
  level:
    root: INFO
    com.rideflow: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n'
