# =============================================================================
# RideFlow — Redis (GEO) config
# Holds the live driver location sorted-sets and availability state.
# MUST NOT evict: silent driver loss would break dispatch.
# =============================================================================

bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 60
timeout 0

# ---- Memory policy: never evict; rely on explicit ZREM / EXPIRE ----
maxmemory-policy noeviction
# maxmemory left unset on purpose — let it grow within container limits

# ---- Persistence: AOF for durability, RDB snapshots as backup ----
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60  10000

# ---- Operational ----
loglevel notice
databases 16
