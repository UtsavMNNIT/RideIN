# =============================================================================
# RideFlow — Redis (CACHE) config
# Rate-limit buckets, idempotency keys, fare estimate cache, surge multipliers,
# refresh tokens, WS session registry. All entries carry TTLs; eviction is fine.
# =============================================================================

bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 60
timeout 0

# ---- Memory policy: bounded LRU ----
maxmemory 256mb
maxmemory-policy allkeys-lru

# ---- No persistence — pure cache; restart loses nothing important ----
appendonly no
save ""

# ---- Operational ----
loglevel notice
databases 16
