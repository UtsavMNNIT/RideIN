# =============================================================================
# CodeQL — static analysis for Java + JavaScript
#
# Runs:
#   - on PRs touching code (cheap, scoped)
#   - weekly on a schedule (catches new query packs against existing code)
#   - on push to main (baseline for PR comparisons)
# =============================================================================
name: codeql

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
  schedule:
    - cron: '23 7 * * 1'      # Mondays 07:23 UTC — off-peak

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java build context only — skipped for JS by the if-guard below.
      - name: Set up Java 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
