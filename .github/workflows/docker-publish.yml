# =============================================================================
# Docker publish — per-service image build, sign, scan, push to GHCR
#
# Triggered on push to main (after backend-ci passes) or manual dispatch.
# Matrix fan-out builds all 7 services in parallel; one service failing does
# not block the others.
#
# Output:
#   - ghcr.io/<owner>/rideflow-<service>:<tag>
#   - cosign signature attached to each image (keyless via OIDC)
#   - SBOM (CycloneDX) attached as an attestation
#   - Trivy scan results uploaded to GitHub Security tab
# =============================================================================
name: docker-publish

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to build (default: all)'
        required: false
        default: 'all'

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish job mid-push

permissions:
  contents: read
  packages: write          # push to GHCR
  id-token: write          # OIDC for cosign keyless signing
  security-events: write   # upload Trivy SARIF
  attestations: write      # SBOM attestation

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: rideflow

jobs:
  # Gate publish on backend CI passing. On `workflow_dispatch` we trust the
  # operator and skip the wait.
  await-ci:
    name: Await backend-ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wait for backend-ci
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Build & test'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  build-push:
    name: ${{ matrix.service }}
    needs: [await-ci]
    if: |
      always() &&
      (needs.await-ci.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false      # one service failing doesn't cancel the others
      matrix:
        service:
          - api-gateway
          - rider-service
          - driver-service
          - location-service
          - matching-service
          - pricing-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=RideFlow ${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODULE=${{ matrix.service }}
          # GHA layer cache — first build per service ~3min, cached ~30s.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          provenance: true
          sbom: true

      # ----- Supply-chain attestations ---------------------------------------

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image (keyless via OIDC)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.service }}.cdx.json
          upload-artifact: true

      # ----- Vulnerability scan ----------------------------------------------

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
