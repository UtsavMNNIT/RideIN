# =============================================================================
# Frontend CI — Next.js 15 / TypeScript / Tailwind
#
# Vercel deploys via its GitHub App (separate path); this workflow exists
# purely as a quality gate so a green check is required before a PR can merge.
# =============================================================================
name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  lint-typecheck-build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      # The build needs valid env vars (env.ts validates at import). These are
      # safe placeholders — real values are configured in Vercel.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_WS_BASE_URL:  ws://localhost:8086
      NEXT_PUBLIC_MAP_PROVIDER: osm
      NEXT_PUBLIC_APP_NAME:     RideFlow
      NEXT_PUBLIC_APP_VERSION:  ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload .next build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next
          path: |
            frontend/.next
            !frontend/.next/cache
          retention-days: 3
